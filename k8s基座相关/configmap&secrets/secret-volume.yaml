apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test-cm
  namespace: default
  labels:
    app: nginx-test-cm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-test-cm
  template:
    metadata:
      labels:
        app: nginx-test-cm
    spec:
      volumes:
      - name: nginxconfsecret
        secret:
          secretName: nginxconf
      containers:
      - name: nginx-test-cm
        image: registry.cn-beijing.aliyuncs.com/dotbalo/nginx:1.15.12
        # 👇 修复后的 envFrom（正确语法+缩进）
        envFrom: # 从 Secret 中获取环境变量批量
        - prefix: SECRET233_ # 可选前缀
          secretRef:  # 引用 Secret
            name: basic-auth-secret  # Secret 的名称
        # 单个环境变量（正确）
        env:
        - name: USERNAME  # 环境变量名称
          valueFrom:  # 从 Secret 中获取值
            secretKeyRef:  # 引用 Secret 中的单个键
              name: basic-auth-secret  # Secret 的名称
              key: username  # Secret 中的键名
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: basic-auth-secret
              key: password        
        # 挂载卷（正确）
        volumeMounts:
        - name: nginxconfsecret
          mountPath: /mnt