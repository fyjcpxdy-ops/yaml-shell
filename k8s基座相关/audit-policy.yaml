apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # 记录 PVC 创建/删除操作
  - level: Metadata
    verbs: ["create", "delete"]
    resources:
    - group: ""  # 核心 API 组
      resources: ["persistentvolumeclaims"]
  
  # 可选：记录 PVC 更新操作（如状态变更）
  - level: Request
    verbs: ["update"]
    resources:
    - group: ""
      resources: ["persistentvolumeclaims"]
  
  # 记录命名空间操作（PVC 依赖命名空间）
  - level: Metadata
    resources:
    - group: ""
      resources: ["namespaces"]

