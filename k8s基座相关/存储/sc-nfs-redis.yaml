# Redis 持久化存储 PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-csi

# Redis 部署 Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: redis
    spec:
      # Pod 级别配置（修复位置）
      restartPolicy: Always
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
      # 容器配置
      containers:
        - name: redis
          # 修复镜像换行错误
          image: registry.cn-beijing.aliyuncs.com/dotbalo/redis:6.2.5-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp-6379
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          # 存活探针
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 2
          # 就绪探针
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 2