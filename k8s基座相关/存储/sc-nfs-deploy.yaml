apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-nfs
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      name: deployment-nfs
  template:
    metadata:
      name: deployment-nfs
      labels:
        name: deployment-nfs
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: deployment-nfs
        image: registry.cn-beijing.aliyuncs.com/dotbalo/nginx:1.15.12
        command:
        - "/bin/bash"
        - "-c"
        - "while true; do echo $(hostname) $(date) >> /mnt/nfs/outfile; sleep 5; done"
        volumeMounts:
        - name: nfs
          mountPath: "/mnt/nfs"
          readOnly: false
      volumes:
      - name: nfs
        persistentVolumeClaim: # 卷类型为 PersistentVolumeClaim
          claimName: pvc-nfs-dynamic  # 引用之前创建的 PVC 名称，必须与之前创建的 PVC 名称一致