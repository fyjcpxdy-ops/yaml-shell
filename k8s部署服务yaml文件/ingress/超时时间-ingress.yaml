apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longtime
  namespace: study-ingress
  annotations:
    # more then: https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/annotations/#custom-timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"  #链接超时
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"  #发送请求超时
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"  #接受请求超时
spec:
  ingressClassName: nginx
  rules:
  - host: longtime.test.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ingress-err
            port:
              number: 8080