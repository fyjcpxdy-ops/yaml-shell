apiVersion: networking.k8s.io/v1 # k8s >= 1.22 必须 v1
kind: Ingress
metadata:
  name: https-ingress
  namespace: study-ingress
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - nginx.test.com
    secretName: ca-secret
  rules:
  - host: nginx.test.com
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: nginx
            port:
              number: 80